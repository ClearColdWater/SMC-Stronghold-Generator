name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build-cpp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build C++
        run: |
          mkdir -p build
          g++ main.cpp -fopenmp -std=c++23 -O3 -Wall -Wextra -Wshadow -pedantic -o build/main.exe

  check-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy matplotlib

      - name: Syntax check
        run: |
          python -m py_compile StrongholdStatsPlot.py