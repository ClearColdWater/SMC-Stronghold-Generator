name: build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-ucrt64:
    name: Windows x64 (MSYS2 UCRT64, OpenMP ON, prebuilt plotter)
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          cache: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Validate release inputs
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $required = @(
            "README.md",
            "LICENSE",
            "THIRD_PARTY_NOTICES.txt",
            "requirements.txt",
            "StrongholdStatsPlotter.py",
            "stronghold-plotter.spec",
            "licenses\lyra\LICENSE",
            "licenses\nlohmann\json\LICENSE",
            "licenses\gcc-libs\COPYING3",
            "licenses\gcc-libs\COPYING.RUNTIME",
            "licenses\libwinpthread\COPYING",
            "licenses\python\LICENSE.txt",
            "licenses\numpy\LICENSE.txt",
            "licenses\matplotlib\LICENSE",
            "licenses\contourpy\LICENSE",
            "licenses\cycler\LICENSE",
            "licenses\fonttools\LICENSE",
            "licenses\fonttools\LICENSE.external",
            "licenses\kiwisolver\LICENSE",
            "licenses\packaging\LICENSE",
            "licenses\packaging\LICENSE.APACHE",
            "licenses\packaging\LICENSE.BSD",
            "licenses\pillow\LICENSE",
            "licenses\pyparsing\LICENSE",
            "licenses\python-dateutil\LICENSE",
            "licenses\six\LICENSE",
            "licenses\pyinstaller\COPYING.txt",
            "licenses\pyinstaller-hooks-contrib\LICENSE",
            "licenses\altgraph\LICENSE",
            "licenses\pefile\LICENSE",
            "licenses\pywin32-ctypes\LICENSE.txt"
          )
          foreach ($path in $required) {
            if (-not (Test-Path $path)) {
              throw "Missing required release input: $path"
            }
          }

      - name: Configure CLI
        shell: msys2 {0}
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build CLI
        shell: msys2 {0}
        run: cmake --build build

      - name: Test CLI
        shell: msys2 {0}
        run: ctest --test-dir build --output-on-failure

      - name: Install plotter build dependencies
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build prebuilt plotter
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          if (Test-Path pyinstaller-build) { Remove-Item pyinstaller-build -Recurse -Force }
          if (Test-Path pyinstaller-dist) { Remove-Item pyinstaller-dist -Recurse -Force }
          python -m PyInstaller --noconfirm --clean --distpath pyinstaller-dist --workpath pyinstaller-build stronghold-plotter.spec
          if (-not (Test-Path "pyinstaller-dist\stronghold-plotter.exe")) {
            throw "Missing pyinstaller-dist\stronghold-plotter.exe"
          }

      - name: Prepare staged package
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $pkgDir = "dist\stronghold-windows-x64"
          if (Test-Path $pkgDir) { Remove-Item $pkgDir -Recurse -Force }
          New-Item -ItemType Directory -Path $pkgDir | Out-Null

          $requiredBuilt = @(
            "build\stronghold-cli.exe",
            "build\libstdc++-6.dll",
            "build\libgcc_s_seh-1.dll",
            "build\libwinpthread-1.dll",
            "build\libgomp-1.dll",
            "pyinstaller-dist\stronghold-plotter.exe"
          )
          foreach ($path in $requiredBuilt) {
            if (-not (Test-Path $path)) {
              throw "Missing built artifact: $path"
            }
          }

          Copy-Item "build\stronghold-cli.exe" $pkgDir
          Copy-Item "build\libstdc++-6.dll" $pkgDir
          Copy-Item "build\libgcc_s_seh-1.dll" $pkgDir
          Copy-Item "build\libwinpthread-1.dll" $pkgDir
          Copy-Item "build\libgomp-1.dll" $pkgDir
          Copy-Item "pyinstaller-dist\stronghold-plotter.exe" $pkgDir
          Copy-Item "README.md" $pkgDir
          Copy-Item "LICENSE" $pkgDir
          Copy-Item "THIRD_PARTY_NOTICES.txt" $pkgDir
          Copy-Item "licenses" $pkgDir -Recurse

      - name: Self-test packaged Windows release
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Push-Location dist\stronghold-windows-x64
          try {
            .\stronghold-cli.exe --help | Out-Null
            .\stronghold-cli.exe --demo --plot --nodes 20 -n 1024 -r 1 --seed 1 --demo-seed 1 -o outputs\package-demo.json --plots plots\package-demo
            if (-not (Test-Path "outputs\package-demo.json")) {
              throw "Missing outputs\package-demo.json"
            }
            $pngs = Get-ChildItem "plots\package-demo" -Filter *.png -ErrorAction Stop
            if (-not $pngs) {
              throw "No plot images generated"
            }
          }
          finally {
            Pop-Location
          }

      - name: Clean staged package test outputs
        shell: pwsh
        run: |
          $pkgDir = "dist\stronghold-windows-x64"
          Remove-Item "$pkgDir\outputs" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "$pkgDir\plots" -Recurse -Force -ErrorAction SilentlyContinue

      - name: Archive Windows artifact
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          if (Test-Path "dist\stronghold-windows-x64.zip") {
            Remove-Item "dist\stronghold-windows-x64.zip" -Force
          }
          Compress-Archive -Path "dist\stronghold-windows-x64" -DestinationPath "dist\stronghold-windows-x64.zip"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: stronghold-windows-x64
          path: dist/stronghold-windows-x64.zip
          if-no-files-found: error
          retention-days: 14

  linux-gcc:
    name: Linux x64 (GCC, OpenMP ON, packaged script plotter)
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y g++ cmake ninja-build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Validate release inputs
        run: |
          set -euo pipefail
          required=(
            README.md
            LICENSE
            THIRD_PARTY_NOTICES.txt
            requirements.txt
            StrongholdStatsPlotter.py
            licenses/lyra/LICENSE
            licenses/nlohmann/json/LICENSE
            licenses/gcc-libs/COPYING3
            licenses/gcc-libs/COPYING.RUNTIME
            licenses/libwinpthread/COPYING
            licenses/python/LICENSE.txt
            licenses/numpy/LICENSE.txt
            licenses/matplotlib/LICENSE
            licenses/contourpy/LICENSE
            licenses/cycler/LICENSE
            licenses/fonttools/LICENSE
            licenses/fonttools/LICENSE.external
            licenses/kiwisolver/LICENSE
            licenses/packaging/LICENSE
            licenses/packaging/LICENSE.APACHE
            licenses/packaging/LICENSE.BSD
            licenses/pillow/LICENSE
            licenses/pyparsing/LICENSE
            licenses/python-dateutil/LICENSE
            licenses/six/LICENSE
            licenses/pyinstaller/COPYING.txt
            licenses/pyinstaller-hooks-contrib/LICENSE
            licenses/altgraph/LICENSE
            licenses/pefile/LICENSE
            licenses/pywin32-ctypes/LICENSE.txt
          )
          for path in "${required[@]}"; do
            test -e "$path" || { echo "Missing required release input: $path"; exit 1; }
          done

      - name: Install plotter runtime dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Configure CLI
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build CLI
        run: cmake --build build

      - name: Test CLI
        run: ctest --test-dir build --output-on-failure

      - name: Prepare staged package
        run: |
          set -euo pipefail
          pkg="dist/stronghold-linux-x64"
          rm -rf "$pkg"
          mkdir -p "$pkg"
          install -m 755 build/stronghold-cli "$pkg/stronghold-cli"
          cp StrongholdStatsPlotter.py "$pkg/"
          cat > "$pkg/stronghold-plotter" <<'EOF'
          #!/usr/bin/env sh
          set -eu
          script_dir=$(CDPATH= cd -- "$(dirname -- "$0")" && pwd)
          exec python3 "$script_dir/StrongholdStatsPlotter.py" "$@"
          EOF
          chmod +x "$pkg/stronghold-plotter"
          cp requirements.txt "$pkg/"
          cp README.md "$pkg/"
          cp LICENSE "$pkg/"
          cp THIRD_PARTY_NOTICES.txt "$pkg/"
          cp -r licenses "$pkg/"

      - name: Self-test packaged Linux release
        run: |
          set -euo pipefail
          pkg="dist/stronghold-linux-x64"
          pushd "$pkg"
          ./stronghold-cli --help >/dev/null
          ./stronghold-cli --demo --plot --nodes 20 -n 1024 -r 1 --seed 1 --demo-seed 1 -o outputs/package-demo.json --plots plots/package-demo
          test -f outputs/package-demo.json
          find plots/package-demo -maxdepth 1 -type f -name '*.png' | grep -q .
          popd

      - name: Clean staged package test outputs
        run: |
          set -euo pipefail
          rm -rf dist/stronghold-linux-x64/outputs dist/stronghold-linux-x64/plots

      - name: Archive Linux artifact
        run: |
          set -euo pipefail
          tar -czf dist/stronghold-linux-x64.tar.gz -C dist stronghold-linux-x64

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: stronghold-linux-x64
          path: dist/stronghold-linux-x64.tar.gz
          if-no-files-found: error
          retention-days: 14

  macos-noomp:
    name: macOS arm64 (OpenMP OFF, packaged script plotter)
    runs-on: macos-14
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure Ninja exists
        run: |
          set -euo pipefail
          if ! command -v ninja >/dev/null 2>&1; then
            brew install ninja
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Validate release inputs
        run: |
          set -euo pipefail
          required=(
            README.md
            LICENSE
            THIRD_PARTY_NOTICES.txt
            requirements.txt
            StrongholdStatsPlotter.py
            licenses/lyra/LICENSE
            licenses/nlohmann/json/LICENSE
            licenses/gcc-libs/COPYING3
            licenses/gcc-libs/COPYING.RUNTIME
            licenses/libwinpthread/COPYING
            licenses/python/LICENSE.txt
            licenses/numpy/LICENSE.txt
            licenses/matplotlib/LICENSE
            licenses/contourpy/LICENSE
            licenses/cycler/LICENSE
            licenses/fonttools/LICENSE
            licenses/fonttools/LICENSE.external
            licenses/kiwisolver/LICENSE
            licenses/packaging/LICENSE
            licenses/packaging/LICENSE.APACHE
            licenses/packaging/LICENSE.BSD
            licenses/pillow/LICENSE
            licenses/pyparsing/LICENSE
            licenses/python-dateutil/LICENSE
            licenses/six/LICENSE
            licenses/pyinstaller/COPYING.txt
            licenses/pyinstaller-hooks-contrib/LICENSE
            licenses/altgraph/LICENSE
            licenses/pefile/LICENSE
            licenses/pywin32-ctypes/LICENSE.txt
          )
          for path in "${required[@]}"; do
            test -e "$path" || { echo "Missing required release input: $path"; exit 1; }
          done

      - name: Install plotter runtime dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Configure CLI
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DSTRONGHOLD_ENABLE_OPENMP=OFF

      - name: Build CLI
        run: cmake --build build

      - name: Test CLI
        run: ctest --test-dir build --output-on-failure

      - name: Prepare staged package
        run: |
          set -euo pipefail
          pkg="dist/stronghold-macos-arm64"
          rm -rf "$pkg"
          mkdir -p "$pkg"
          install -m 755 build/stronghold-cli "$pkg/stronghold-cli"
          cp StrongholdStatsPlotter.py "$pkg/"
          cat > "$pkg/stronghold-plotter" <<'EOF'
          #!/usr/bin/env sh
          set -eu
          script_dir=$(CDPATH= cd -- "$(dirname -- "$0")" && pwd)
          exec python3 "$script_dir/StrongholdStatsPlotter.py" "$@"
          EOF
          chmod +x "$pkg/stronghold-plotter"
          cp requirements.txt "$pkg/"
          cp README.md "$pkg/"
          cp LICENSE "$pkg/"
          cp THIRD_PARTY_NOTICES.txt "$pkg/"
          cp -r licenses "$pkg/"

      - name: Self-test packaged macOS release
        run: |
          set -euo pipefail
          pkg="dist/stronghold-macos-arm64"
          pushd "$pkg"
          ./stronghold-cli --help >/dev/null
          ./stronghold-cli --demo --plot --nodes 20 -n 1024 -r 1 --seed 1 --demo-seed 1 -o outputs/package-demo.json --plots plots/package-demo
          test -f outputs/package-demo.json
          find plots/package-demo -maxdepth 1 -type f -name '*.png' | grep -q .
          popd

      - name: Clean staged package test outputs
        run: |
          set -euo pipefail
          rm -rf dist/stronghold-macos-arm64/outputs dist/stronghold-macos-arm64/plots

      - name: Archive macOS artifact
        run: |
          set -euo pipefail
          tar -czf dist/stronghold-macos-arm64.tar.gz -C dist stronghold-macos-arm64

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: stronghold-macos-arm64
          path: dist/stronghold-macos-arm64.tar.gz
          if-no-files-found: error
          retention-days: 14